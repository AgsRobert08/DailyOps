{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — {{ company.name|default:"Daily Ops" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: {{ company.primary_color|default:"#b91085" }}; /* El color magenta de tu imagen */
      --brand-dark: color-mix(in srgb, var(--brand) 80%, #000);
      --text-main: #1e293b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body, html {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background-color: #ffffff;
    }

    .container {
      display: grid;
      grid-template-columns: 0.8fr 1.2fr; /* Columna de color más pequeña */
      min-height: 100vh;
      width: 100%;
    }

    /* --- PANEL IZQUIERDO (FRASE) --- */
    .info-panel {
      position: relative;
      background: var(--brand);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: white;
      text-align: center;
    }

    .info-panel h2 {
      font-size: clamp(24px, 4vw, 48px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      z-index: 5;
    }

    .info-panel p {
      margin-top: 20px;
      font-size: 1.1rem;
      opacity: 0.9;
      font-weight: 300;
      z-index: 5;
    }

    /* Divisor curvo invertido hacia adentro */
    .curve {
      position: absolute;
      right: -1px;
      top: 0;
      height: 100%;
      width: 80px;
      fill: #ffffff;
      z-index: 10;
    }

    /* --- PANEL DERECHO (LOGO + FORM) --- */
    .login-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      background: white;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      animation: slideUp 0.6s ease-out;
    }

    /* Contenedor del Logo sobre el Bienvenido */
    .logo-box {
      margin-bottom: 30px;
      text-align: left;
    }

    .logo-box img {
      max-width: 180px; /* Tamaño del logo ajustado */
      height: auto;
      object-fit: contain;
    }

    .welcome-text h1 { 
      font-size: 38px; 
      font-weight: 700; 
      color: var(--text-main);
      margin-bottom: 5px;
    }

    .welcome-text p { 
      color: #64748b; 
      margin-bottom: 35px;
      font-size: 16px; 
    }

    /* Estilos de Formulario */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: #475569;
    }

    .input-ctrl {
      width: 100%;
      padding: 16px 22px;
      border-radius: 16px; /* Curvas elegantes pero no exageradas */
      border: 2px solid #f1f5f9;
      background: #f8fafc;
      font-family: inherit;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .input-ctrl:focus {
      outline: none;
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 8px 15px rgba(0,0,0,0.05);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: var(--brand);
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      box-shadow: 0 10px 20px color-mix(in srgb, var(--brand) 30%, transparent);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      filter: brightness(1.1);
      box-shadow: 0 15px 25px color-mix(in srgb, var(--brand) 40%, transparent);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- RESPONSIVO --- */
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
      
      .info-panel {
        padding: 40px 20px;
        min-height: 250px;
      }

      .curve {
        bottom: -1px;
        top: auto;
        right: 0;
        width: 100%;
        height: 60px;
        transform: rotate(180deg);
      }

      .login-panel {
        padding: 40px 25px;
        align-items: flex-start;
      }
      
      .logo-box { text-align: center; }
      .welcome-text { text-align: center; }
    }
  </style>
</head>
<body>

<div class="container">
  
  <section class="info-panel">
    <h2>Gestión que fluye contigo.</h2>
    <p>Optimiza tu operación diaria en un solo lugar.</p>
    
    <svg class="curve" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path d="M100 0 C 0 0 0 100 100 100 Z"></path>
    </svg>
  </section>

  <section class="login-panel">
    <div class="login-wrapper">
      
      

      <div class="welcome-text">
        <h1>Bienvenido</h1>
        <p>Accede a <strong>{{ company.name|default:"Daily Ops" }}</strong></p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="field">
          <label>Usuario</label>
          <input type="text" name="username" class="input-ctrl" placeholder="ej: nombre.apellido" required>
        </div>

        <div class="field">
          <label>Contraseña</label>
          <input type="password" name="password" class="input-ctrl" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-login">
          Entrar ahora
        </button>
      </form>
    </div>
  </section>

</div>

</body>
</html>
